# ~/.tmux.conf
# Clean, practical tmux config for daily development.
# Works well with zsh + fzf + zoxide + sessionize workflow.

# -----------------------------
# PREFIX
# -----------------------------
# Use Ctrl-Space as prefix.
# If this is inconsistent in your terminal/keyboard, switch to C-a.
set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

# -----------------------------
# TERMINAL / COLORS
# -----------------------------
# Advertise tmux's own terminfo inside panes.
set -g default-terminal "tmux-256color"

# Enable RGB/truecolor for common host terminals without forcing it globally.
# terminal-features is preferred on modern tmux; terminal-overrides keeps Tc compatibility.
set -as terminal-features ",xterm-256color:RGB,screen-256color:RGB,tmux-256color:RGB"
set -as terminal-features ",alacritty:RGB,foot:RGB,ghostty:RGB,kitty:RGB,wezterm:RGB,xterm-kitty:RGB,xterm-ghostty:RGB"
set -as terminal-overrides ",xterm-256color:Tc,screen-256color:Tc,tmux-256color:Tc"
set -as terminal-overrides ",alacritty:Tc,foot:Tc,ghostty:Tc,kitty:Tc,wezterm:Tc,xterm-kitty:Tc,xterm-ghostty:Tc"

# -----------------------------
# GENERAL
# -----------------------------
set -g mouse on
set -g history-limit 10000

# Start window and pane numbering at 1 instead of 0.
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows automatically after closing one.
set -g renumber-windows on

# Better responsiveness.
set -sg escape-time 0
set -g focus-events on

# Use vi-style keys in copy mode.
setw -g mode-keys vi

# -----------------------------
# COPY MODE
# -----------------------------
# Vim-like selection in vi copy mode.
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# -----------------------------
# SPLITS
# -----------------------------
# Open splits in the current pane's working directory.
unbind '"'
unbind %

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# -----------------------------
# NAVIGATION (VIM STYLE)
# -----------------------------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# No-prefix pane navigation.
# If your terminal uses Option+Arrow for word movement, remove these binds.
bind -n M-Left select-pane -L
bind -n M-Down select-pane -D
bind -n M-Up select-pane -U
bind -n M-Right select-pane -R

# -----------------------------
# RESIZE (REPEATABLE)
# -----------------------------
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# -----------------------------
# WINDOWS
# -----------------------------
# Create new window in current pane path.
bind c new-window -c "#{pane_current_path}"

# Close pane / window.
# tmux asks for confirmation on kill-window by default.
bind x kill-pane
bind & confirm-before -p "kill-window #W? (y/n)" kill-window

# Quick window navigation.
bind -r C-h previous-window
bind -r C-l next-window

# No-prefix window navigation.
bind -n S-Left previous-window
bind -n S-Right next-window

# -----------------------------
# SESSION
# -----------------------------
bind d detach-client

# -----------------------------
# RELOAD CONFIG
# -----------------------------
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# -----------------------------
# STATUS BAR
# -----------------------------
set -g status-position bottom
set -g status-bg black
set -g status-fg green

# Left: current session name
set -g status-left " #S "

# Right: date + time
set -g status-right " %Y-%m-%d %H:%M "

# Make window list cleaner
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #[bold]#I:#W#[default] "

# -----------------------------
# PLUGINS
# -----------------------------
# No TPM/plugins by default; keep setup reproducible with Brewfile + Stow only.
